<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易相机</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        video {
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #000;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #3b82f6;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #2563eb;
        }
        #capturedImage {
            max-width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>简易相机</h1>
    <p id="whoamiResult">正在获取 whoami 结果...</p>
    <video id="video" autoplay playsinline></video>
    <div>
        <button id="captureBtn">拍照</button>
        <button id="retakeBtn" style="display: none;">重拍</button>
    </div>
    <img id="capturedImage" style="display: none;" alt="Captured Image">

    <script>
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const capturedImage = document.getElementById('capturedImage');
        const whoamiResult = document.getElementById('whoamiResult');

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        function updateWhoami() {
            try {
                const result = JSON.parse(NativeBridge.root_cmd('whoami'));
                whoamiResult.textContent = 'whoami: ' + (result[0] || '[empty]') +
                    '，stderr: ' + (result[1] || '[none]') +
                    '，status: ' + result[2];
            } catch (err) {
                whoamiResult.textContent = 'whoami 调用失败: ' + err.message;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error('无法访问相机:', err);
                    alert('无法访问相机: ' + err.message);
                });
        }

        captureBtn.addEventListener('click', () => {
            if (!video.videoWidth || !video.videoHeight) {
                alert('视频尚未准备好，请稍后重试。');
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedImage.src = canvas.toDataURL('image/png');
            capturedImage.style.display = 'block';
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
        });

        retakeBtn.addEventListener('click', () => {
            capturedImage.style.display = 'none';
            video.style.display = 'block';
            captureBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'none';
        });

        startCamera();
        updateWhoami();
    </script>
</body>
</html>
