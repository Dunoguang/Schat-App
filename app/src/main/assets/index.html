<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易相机</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        video {
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #000;
        }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 400px;
        }
        video {
            display: block;
            width: 100%;
        }
        .camera-label {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #3b82f6;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #2563eb;
        }
        button.secondary {
            background-color: #10b981;
        }
        button.secondary:hover {
            background-color: #059669;
        }
        button.danger {
            background-color: #ef4444;
        }
        button.danger:hover {
            background-color: #dc2626;
        }
        #capturedImage {
            max-width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        #base64Display {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            display: none;
        }
        .button-group {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>简易相机</h1>
    <p id="whoamiResult">正在获取 whoami 结果...</p>
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="camera-label" id="cameraLabel">后置摄像头</div>
    </div>
    <div class="button-group">
        <button id="captureBtn">拍照</button>
        <button id="switchCameraBtn" class="secondary">切换摄像头</button>
    </div>
    <div class="button-group">
        <button id="retakeBtn" style="display: none;">重拍</button>
        <button id="saveBtn" style="display: none;" class="secondary">保存照片</button>
    </div>
    <img id="capturedImage" style="display: none;" alt="Captured Image">
    <div id="base64Display"></div>

    <script>
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const saveBtn = document.getElementById('saveBtn');
        const capturedImage = document.getElementById('capturedImage');
        const whoamiResult = document.getElementById('whoamiResult');
        const cameraLabel = document.getElementById('cameraLabel');
        const base64Display = document.getElementById('base64Display');

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        let stream = null;
        let currentFacingMode = 'environment'; // 'environment' for back, 'user' for front
        let currentImageData = null; // Store the captured image data

        function updateWhoami() {
            try {
                const result = JSON.parse(NativeBridge.root_cmd('whoami'));
                whoamiResult.textContent = 'whoami: ' + (result[0] || '[empty]') +
                    '，stderr: ' + (result[1] || '[none]') +
                    '，status: ' + result[2];
            } catch (err) {
                whoamiResult.textContent = 'whoami 调用失败: ' + err.message;
            }
        }

        function updateCameraLabel() {
            cameraLabel.textContent = currentFacingMode === 'user' ? '前置摄像头' : '后置摄像头';
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        function startCamera() {
            stopCamera();
            const constraints = {
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(mediaStream => {
                    stream = mediaStream;
                    video.srcObject = stream;
                    updateCameraLabel();
                })
                .catch(err => {
                    console.error('无法访问相机:', err);
                    // Try without specific facingMode if the above fails
                    navigator.mediaDevices.getUserMedia({ video: true })
                        .then(mediaStream => {
                            stream = mediaStream;
                            video.srcObject = stream;
                            updateCameraLabel();
                        })
                        .catch(fallbackErr => {
                            console.error('无法访问相机（备用）:', fallbackErr);
                            alert('无法访问相机: ' + fallbackErr.message);
                        });
                });
        }

        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            if (!video.videoWidth || !video.videoHeight) {
                alert('视频尚未准备好，请稍后重试。');
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // If using front camera, flip the image horizontally
            if (currentFacingMode === 'user') {
                const flippedCanvas = flipCanvasHorizontally(canvas);
                capturedImage.src = flippedCanvas.toDataURL('image/png');
                currentImageData = flippedCanvas.toDataURL('image/png');
            } else {
                capturedImage.src = canvas.toDataURL('image/png');
                currentImageData = canvas.toDataURL('image/png');
            }

            capturedImage.style.display = 'block';
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            switchCameraBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
            saveBtn.style.display = 'inline-block';
            base64Display.style.display = 'block';
            base64Display.textContent = currentImageData;
        });

        function flipCanvasHorizontally(sourceCanvas) {
            const flippedCanvas = document.createElement('canvas');
            const flippedCtx = flippedCanvas.getContext('2d');
            flippedCanvas.width = sourceCanvas.width;
            flippedCanvas.height = sourceCanvas.height;

            // Flip horizontally
            flippedCtx.translate(flippedCanvas.width, 0);
            flippedCtx.scale(-1, 1);
            flippedCtx.drawImage(sourceCanvas, 0, 0);

            return flippedCanvas;
        }

        retakeBtn.addEventListener('click', () => {
            capturedImage.style.display = 'none';
            video.style.display = 'block';
            captureBtn.style.display = 'inline-block';
            switchCameraBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'none';
            saveBtn.style.display = 'none';
            base64Display.style.display = 'none';
            currentImageData = null;
        });

        saveBtn.addEventListener('click', () => {
            if (currentImageData) {
                // Convert data URL to blob and save
                const base64 = currentImageData.split(',')[1];
                try {
                    const result = JSON.parse(
                        NativeBridge.saveImage(base64, currentFacingMode === 'user')
                    );
                    if (result.success) {
                        alert('照片已保存到: ' + result.path);
                    } else {
                        alert('保存失败: ' + result.error);
                    }
                } catch (err) {
                    alert('保存失败: ' + err.message);
                }
            }
        });

        startCamera();
        updateWhoami();
    </script>
</body>
</html>
